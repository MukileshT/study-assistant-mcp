[pytest]
# Pytest configuration

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Command line options
addopts =
    -ra
    -q
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --asyncio-mode=auto

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests (require API keys)
    unit: marks tests as unit tests
    performance: marks tests as performance tests

# Coverage settings
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    except ImportError

# Ignore patterns
ignore_errors = True
precision = 2

[coverage:html]
directory = htmlcov